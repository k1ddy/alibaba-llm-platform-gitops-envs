apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-runtime
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-runtime
    spec:
      containers:
        - name: ai-runtime
          image: registry.example.com/alibaba-llm-ai-runtime:base
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: ai-runtime-config
          volumeMounts:
            - name: runtime-data
              mountPath: /app/runtime_data
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
      volumes:
        - name: runtime-data
          emptyDir: {}
